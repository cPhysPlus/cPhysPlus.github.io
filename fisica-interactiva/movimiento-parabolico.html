<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movimiento Parabólico</title>

<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.17.0/plotly.min.js"></script>

<style>
:root {
    --primary: #6c5ce7;
    --accent: #00cec9;
    --bg: #0f1226;
    --card: #1c1f3a;
    --text: #eaeaf0;
}

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: radial-gradient(circle at top, #1c1f3a, #0f1226);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
}

.header h2 {
    margin: 0;
    font-size: 2.2rem;
    color: var(--accent);
}

.header p {
    max-width: 700px;
    margin: 10px auto;
    opacity: 0.8;
}

/* MAIN CONTAINER */
.container {
    width: 95%;
    max-width: 1100px;
}

/* CONTROLS */
.controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.slider-container {
    background: var(--card);
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.slider-container label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    opacity: 0.8;
}

/* SLIDER */
input[type="range"] {
    width: 100%;
    accent-color: var(--primary);
}

/* VALUE */
.value {
    font-weight: bold;
    color: var(--accent);
}

/* PLOT */
.plot-box {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#plotly-graph {
    width: 100%;
    height: 550px;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 0.85rem;
    opacity: 0.7;
    margin: 30px 20px;
    max-width: 800px;
}
</style>
</head>

<body>

<div class="header">
    <h2>Movimiento Parabólico</h2>
    <p>Explora cómo la velocidad inicial y el ángulo afectan la trayectoria de un proyectil.</p>
</div>

<div class="container">

<div class="controls">

    <div class="slider-container">
        <label>Velocidad Inicial (v₀) [m/s]</label>
        <input type="range" id="v0_slider" min="1" max="50" value="20">
        <div><span class="value" id="v0_value">20</span> m/s</div>
    </div>

    <div class="slider-container">
        <label>Ángulo de Lanzamiento (α) [°]</label>
        <input type="range" id="alpha_slider" min="0" max="90" value="45">
        <div><span class="value" id="alpha_value">45</span> °</div>
    </div>

</div>

<div class="plot-box">
    <div id="plotly-graph"></div>
</div>

</div>

<div class="footer">
    <p>
        Notebook disponible en 
        <a href="https://github.com/wbandabarragan/computational-physics/blob/main/fisica-interactiva/movimiento-parabolico.ipynb" target="_blank">
        GitHub</a>.
    </p>
    <p>cPhys+ — Universidad Yachay Tech, Ecuador</p>
</div>

<script>
const g = 9.8;
const x0 = 0;
const y0 = 0;

Math.radians = function(degrees) {
    return degrees * Math.PI / 180;
};

function parabolico(v0, alpha_g) {
    const alpha = Math.radians(alpha_g);
    const t_vuelo = 2 * v0 * Math.sin(alpha) / g;
    const x_vuelo = (v0 ** 2 * Math.sin(2 * alpha)) / g;
    const y_vuelo = (v0 * Math.sin(alpha)) ** 2 / (2 * g);
    const t = Array.from({ length: 500 }, (_, i) => i * t_vuelo / 499);
    const x = t.map(ti => x0 + v0 * Math.cos(alpha) * ti);
    const y = t.map(ti => y0 + v0 * Math.sin(alpha) * ti - 0.5 * g * ti ** 2);
    return [x, y, t_vuelo, x_vuelo, y_vuelo];
}

function extremos(v0, a1, a2) {
    const max_a1 = Math.radians(a1);
    const max_a2 = Math.radians(a2);
    const max_y = (v0 * Math.sin(max_a1)) ** 2 / (2 * g);
    const max_x = (v0 ** 2 * Math.sin(2 * max_a2)) / g;
    return [max_x, max_y];
}

function grafico(v0, alpha_g) {
    const [x, y, t_vuelo, x_vuelo, y_vuelo] = parabolico(v0, alpha_g);
    const [max_x, max_y] = extremos(v0, 90, 45);

    const trace = {
        x: x,
        y: y,
        mode: 'lines',
        name: `α = ${alpha_g}°`,
        line: { color: '#00cec9', width: 3 }
    };

    const layout = {
        title: `v₀ = ${v0} m/s | t = ${t_vuelo.toFixed(2)} s | Alcance = ${x_vuelo.toFixed(1)} m`,
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(255,255,255,0.02)',
        xaxis: { title: 'x [m]', range: [-1, max_x + 1] },
        yaxis: { title: 'y [m]', range: [-1, max_y + 1] },
        font: { color: '#eaeaf0' }
    };

    Plotly.newPlot('plotly-graph', [trace], layout);
}

const v0_slider = document.getElementById("v0_slider");
const alpha_slider = document.getElementById("alpha_slider");
const v0_value = document.getElementById("v0_value");
const alpha_value = document.getElementById("alpha_value");

v0_slider.addEventListener("input", () => {
    v0_value.textContent = v0_slider.value;
    grafico(v0_slider.value, alpha_slider.value);
});

alpha_slider.addEventListener("input", () => {
    alpha_value.textContent = alpha_slider.value;
    grafico(v0_slider.value, alpha_slider.value);
});

grafico(v0_slider.value, alpha_slider.value);

window.addEventListener('resize', () => {
    grafico(v0_slider.value, alpha_slider.value);
});
</script>

</body>
</html>
